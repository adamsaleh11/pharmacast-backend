spring:
  application:
    name: pharmaforecast-backend
  profiles:
    default: local
  datasource:
    url: jdbc:postgresql://localhost:5432/pharmaforecast
    username: pharmaforecast
    password: pharmaforecast
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

pharmaforecast:
  security:
    supabase:
      jwk-set-uri: ${SUPABASE_JWKS_URI:http://localhost:54321/auth/v1/.well-known/jwks.json}
      issuer: ${SUPABASE_JWT_ISSUER:}
      audiences:
        - ${SUPABASE_JWT_AUDIENCE:authenticated}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: 8080

---
spring:
  config:
    activate:
      on-profile: local
  flyway:
    locations: classpath:db/migration,classpath:db/dev-migration

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  flyway:
    locations: classpath:db/migration
  jpa:
    properties:
      hibernate:
        format_sql: false
