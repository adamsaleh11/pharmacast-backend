spring:
  application:
    name: pharmaforecast-backend
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  config:
    import: optional:file:./config.properties
  profiles:
    include: prod
  datasource:
    url: jdbc:postgresql://localhost:5432/pharmaforecast
    username: pharmaforecast
    password: pharmaforecast
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

pharmaforecast:
  forecast-service-url: ${FORECAST_SERVICE_BASE_URL:${FORECAST_SERVICE_URL:}}
  backtest-on-upload-enabled: ${BACKTEST_ON_UPLOAD_ENABLED:true}
  backtest-http-timeout-seconds: ${BACKTEST_HTTP_TIMEOUT_SECONDS:60}
  insights:
    stockout-value-per-day: ${INSIGHTS_STOCKOUT_VALUE_PER_DAY:150}
  resend:
    api-key: ${RESEND_API_KEY:}
    from-email: ${RESEND_FROM_EMAIL:}
  security:
    supabase:
      jwk-set-uri: ${SUPABASE_JWKS_URI:http://localhost:54321/auth/v1/.well-known/jwks.json}
      issuer: ${SUPABASE_JWT_ISSUER:}
      audiences:
        - ${SUPABASE_JWT_AUDIENCE:authenticated}
  jobs:
    din-refresh-cron: ${DIN_REFRESH_CRON:0 0 7 * * SUN}
    # UTC cron defaults map to Eastern Standard Time. During daylight saving time,
    # local delivery shifts one hour later unless these values are changed or a
    # future scheduler uses zone-aware America/Toronto cron.
    daily-notification-cron: ${DAILY_NOTIFICATION_CRON:0 0 11 * * *}
    daily-digest-cron: ${DAILY_DIGEST_CRON:0 0 12 * * *}
    weekly-insights-cron: ${WEEKLY_INSIGHTS_CRON:0 0 13 * * MON}
  app-url: ${APP_URL:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: 8080

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

---
spring:
  config:
    activate:
      on-profile: local
  flyway:
    locations: classpath:db/migration,classpath:db/dev-migration
---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      connection-timeout: 30000
      validation-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1500000
      keepalive-time: 300000
      data-source-properties:
        prepareThreshold: 0
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
  jpa:
    properties:
      hibernate:
        format_sql: false
