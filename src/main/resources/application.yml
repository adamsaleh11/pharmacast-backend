spring:
  application:
    name: pharmaforecast-backend
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  config:
    import: optional:file:./config.properties
  profiles:
    include: prod
  datasource:
    url: jdbc:postgresql://localhost:5432/pharmaforecast
    username: pharmaforecast
    password: pharmaforecast
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

pharmaforecast:
  security:
    supabase:
      jwk-set-uri: ${SUPABASE_JWKS_URI:http://localhost:54321/auth/v1/.well-known/jwks.json}
      issuer: ${SUPABASE_JWT_ISSUER:}
      audiences:
        - ${SUPABASE_JWT_AUDIENCE:authenticated}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: 8080

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

---
spring:
  config:
    activate:
      on-profile: local
  flyway:
    locations: classpath:db/migration,classpath:db/dev-migration
---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      data-source-properties:
        prepareThreshold: 0
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
  jpa:
    properties:
      hibernate:
        format_sql: false
