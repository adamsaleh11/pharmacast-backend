services:
  postgres:
    image: postgres:16-alpine
    container_name: pharmaforecast-postgres
    environment:
      POSTGRES_DB: pharmaforecast
      POSTGRES_USER: pharmaforecast
      POSTGRES_PASSWORD: pharmaforecast
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharmaforecast -d pharmaforecast"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
